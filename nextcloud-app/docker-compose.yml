services:
  nextcloud:
    image: lscr.io/linuxserver/nextcloud:latest@sha256:b06a868994d366aff8cc69851f478a6f235134971d50fd44936c60937c64a15e
    container_name: nextcloud
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
    dns:
      - 2001:4860:4860::6464
      - 2001:4860:4860::64
    volumes:
      - ./config:/config
      - /mnt/storagebox/nextcloud-data:/data
    ports:
      - 127.0.0.1:8080:443
    restart: unless-stopped
    networks:
      - nextcloud-net

  db:
    image: mariadb:10.11@sha256:407fccb51e710f34752c1a3ef9b936d1f55f38d4ac7fa043b3759742d266fd9a
    container_name: nextcloud_db
    command: --transaction-isolation=READ-COMMITTED --log-bin=binlog --binlog-format=ROW
    environment:
      - MYSQL_ROOT_PASSWORD=8nyUmiqo/yZTfyd5lxa4tx+ygAuxCVXN
      - MYSQL_PASSWORD=tcdi05txjkt0dpqppy8++ixm4bbdaltk
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
    volumes:
      - ./db_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - nextcloud-net

networks:
  nextcloud-net:
    enable_ipv6: true
    ipam:
      config:
        - subnet: fd00:1:1::/64
