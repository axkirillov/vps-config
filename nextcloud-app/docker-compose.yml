services:
  nextcloud:
    image: lscr.io/linuxserver/nextcloud:latest
    container_name: nextcloud
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
    volumes:
      - ./config:/config
      - /mnt/storagebox/nextcloud-data:/data
    ports:
      - 127.0.0.1:8080:443
    restart: unless-stopped
